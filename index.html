<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Meditation Farm Simulator + SomaFM</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; }
        canvas { display: block; image-rendering: pixelated; }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.75);
            padding: 15px;
            border-radius: 12px;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
        }

        .stat { margin-bottom: 5px; font-weight: bold; font-family: monospace; letter-spacing: 1px; }
        .controls { font-size: 12px; margin-top: 10px; color: #888; line-height: 1.4; }

        /* Soma.fm Footer Styles */
        #footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            box-sizing: border-box;
            z-index: 100;
        }

        .radio-info { display: flex; align-items: center; gap: 15px; }
        .radio-logo { width: 40px; height: 40px; background: #333; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #ff9800; border: 1px solid #444; }
        .radio-text { display: flex; flex-direction: column; }
        .station-name { font-weight: bold; font-size: 14px; color: #fff; }
        .station-desc { font-size: 11px; color: #888; }

        .radio-controls { display: flex; align-items: center; gap: 10px; }
        button {
            background: #333;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        button:hover { background: #444; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button.play-btn { background: #ff9800; color: black; font-weight: bold; }
        button.play-btn:hover { background: #ffa726; }

        #overlay {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        .msg-box {
            background: rgba(0, 255, 100, 0.2);
            border: 1px solid #0f6;
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat">VOXEL FARM SIM v2.0</div>
    <div id="status" class="stat">TRACTOR: IDLE</div>
    <div id="stats" class="stat">TILLED: 0 | ANIMALS: 12</div>
    <div class="controls">
        [W,A,S,D] Drive & Steer<br>
        [SPACE] Till Soil<br>
        [1, 2] Camera Views
    </div>
</div>

<div id="overlay">
    <div id="msg" class="msg-box">Ready for Seeding!</div>
</div>

<!-- SomaFM Footer -->
<footer id="footer">
    <div class="radio-info">
        <div class="radio-logo">S</div>
        <div class="radio-text">
            <span id="station-name" class="station-name">Groove Salad</span>
            <span id="station-desc" class="station-desc">Ambient/Downtempo Chill</span>
        </div>
    </div>
    
    <div class="radio-controls">
        <button onclick="changeStation(-1)">◀ Prev</button>
        <button id="play-pause" class="play-btn" onclick="toggleRadio()">▶ PLAY</button>
        <button onclick="changeStation(1)">Next ▶</button>
        <div style="margin-left: 10px; display: flex; align-items: center; gap: 8px;">
            <span style="font-size: 10px; color: #666;">VOL</span>
            <input type="range" min="0" max="1" step="0.05" value="0.5" oninput="updateVolume(this.value)" style="width: 80px; cursor: pointer;">
        </div>
    </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/**
 * SomaFM Radio Logic
 */
const stations = [
    { name: "Groove Salad", desc: "Ambient/Downtempo Chill", url: "https://ice1.somafm.com/groovesalad-128-mp3" },
    { name: "Drone Zone", desc: "Atmospheric Textures", url: "https://ice1.somafm.com/dronezone-128-mp3" },
    { name: "Deep Space One", desc: "Deep Ambient & Space", url: "https://ice1.somafm.com/deepspaceone-128-mp3" },
    { name: "Secret Agent", desc: "Stylish Lounge & Spy Music", url: "https://ice1.somafm.com/secretagent-128-mp3" },
    { name: "Lush", desc: "Sensuous Mellow Vocals", url: "https://ice1.somafm.com/lush-128-mp3" },
    { name: "DEF CON Radio", desc: "Music for Hacking", url: "https://ice1.somafm.com/defcon-128-mp3" }
];

let currentStationIdx = 0;
let audioPlayer = new Audio();
audioPlayer.volume = 0.5;
let isPlaying = false;

function updateRadioUI() {
    const s = stations[currentStationIdx];
    document.getElementById('station-name').innerText = s.name;
    document.getElementById('station-desc').innerText = s.desc;
}

function toggleRadio() {
    const btn = document.getElementById('play-pause');
    if (!isPlaying) {
        audioPlayer.src = stations[currentStationIdx].url;
        audioPlayer.play().catch(e => console.log("User interaction required"));
        btn.innerText = "⏸ PAUSE";
        btn.classList.remove('play-btn');
        isPlaying = true;
    } else {
        audioPlayer.pause();
        audioPlayer.src = ""; // Stop stream download
        btn.innerText = "▶ PLAY";
        btn.classList.add('play-btn');
        isPlaying = false;
    }
}

function changeStation(dir) {
    currentStationIdx = (currentStationIdx + dir + stations.length) % stations.length;
    updateRadioUI();
    if (isPlaying) {
        audioPlayer.src = stations[currentStationIdx].url;
        audioPlayer.play();
    }
}

function updateVolume(val) {
    audioPlayer.volume = val;
}

/**
 * Game Logic (Three.js)
 */
let scene, camera, renderer, clock;
let tractor, terrain = [];
let animals = [];
let tilledCount = 0;
let keys = {};
let gridWidth = 40;
let gridDepth = 40;
const VOXEL_SIZE = 1;

const COLORS = {
    GRASS: 0x4caf50,
    DIRT: 0x8b4513,
    TILLED: 0x5d2e0c,
    TRACTOR: 0xffd700,
    WHEEL: 0x222222,
    CHICKEN: 0xffffff,
    COW: 0xf5f5f5
};

window.onload = function() {
    init();
    animate();
    updateRadioUI();
};

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.FogExp2(0x87ceeb, 0.015);
    
    camera = new THREE.PerspectiveCamera(60, window.innerWidth / (window.innerHeight - 60), 0.1, 1000);
    camera.position.set(20, 20, 40);

    renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight - 60);
    renderer.setPixelRatio(0.6); // Heavy pixelation for voxel aesthetic
    document.body.insertBefore(renderer.domElement, document.getElementById('footer'));

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xffffff, 0.9);
    sunLight.position.set(20, 50, 10);
    scene.add(sunLight);

    createLandscape();
    createTractor();

    for(let i = 0; i < 10; i++) spawnAnimal('chicken');
    for(let i = 0; i < 5; i++) spawnAnimal('cow');

    clock = new THREE.Clock();

    window.addEventListener('keydown', e => {
        keys[e.code] = true;
        // Start audio on first key press if not playing (safari/chrome policy)
        if(!isPlaying && e.code !== 'Space') {} 
    });
    window.addEventListener('keyup', e => keys[e.code] = false);
    window.addEventListener('resize', onWindowResize);
}

function createLandscape() {
    const geometry = new THREE.BoxGeometry(VOXEL_SIZE, VOXEL_SIZE, VOXEL_SIZE);
    for (let x = 0; x < gridWidth; x++) {
        terrain[x] = [];
        for (let z = 0; z < gridDepth; z++) {
            const isDirt = (x > 12 && x < 28 && z > 12 && z < 28);
            const mat = new THREE.MeshStandardMaterial({ 
                color: isDirt ? COLORS.DIRT : COLORS.GRASS,
                flatShading: true 
            });
            
            const voxel = new THREE.Mesh(geometry, mat);
            voxel.position.set(x, -0.5, z);
            scene.add(voxel);
            
            terrain[x][z] = { mesh: voxel, type: isDirt ? 'dirt' : 'grass', tilled: false };
        }
    }
}

function createTractor() {
    const group = new THREE.Group();
    
    // Body
    const body = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.8, 2.2), new THREE.MeshStandardMaterial({ color: COLORS.TRACTOR }));
    body.position.y = 0.7;
    group.add(body);

    // Engine Block
    const engine = new THREE.Mesh(new THREE.BoxGeometry(1, 0.6, 1), new THREE.MeshStandardMaterial({ color: 0x333333 }));
    engine.position.set(0, 0.7, 1);
    group.add(engine);

    // Chimney
    const chim = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 0.2), new THREE.MeshStandardMaterial({ color: 0x111111 }));
    chim.position.set(0.3, 1.4, 1.2);
    group.add(chim);

    // Wheels
    const wGeom = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 8);
    const wMat = new THREE.MeshStandardMaterial({ color: COLORS.WHEEL });
    [[0.7, 0.5, 0.8], [-0.7, 0.5, 0.8], [0.7, 0.5, -0.8], [-0.7, 0.5, -0.8]].forEach(p => {
        const w = new THREE.Mesh(wGeom, wMat);
        w.rotation.z = Math.PI/2;
        w.position.set(...p);
        group.add(w);
    });

    group.position.set(20, 0, 10);
    scene.add(group);
    tractor = { mesh: group, vel: 0, rot: 0 };
}

function spawnAnimal(type) {
    const g = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({ color: type === 'chicken' ? COLORS.CHICKEN : COLORS.COW });
    const b = new THREE.Mesh(new THREE.BoxGeometry(type === 'chicken' ? 0.3 : 0.6, 0.4, 0.5), mat);
    g.add(b);
    g.position.set(Math.random() * gridWidth, 0.2, Math.random() * gridDepth);
    scene.add(g);
    animals.push({ mesh: g, type, timer: 0, dir: Math.random() * Math.PI * 2 });
}

function handleInput(delta) {
    if (keys['KeyW']) tractor.vel = Math.min(tractor.vel + 10 * delta, 6);
    else if (keys['KeyS']) tractor.vel = Math.max(tractor.vel - 10 * delta, -3);
    else tractor.vel *= 0.92;

    if (keys['KeyA']) tractor.rot += 3 * delta;
    if (keys['KeyD']) tractor.rot -= 3 * delta;

    tractor.mesh.rotation.y = tractor.rot;
    tractor.mesh.translateZ(tractor.vel * delta);

    // Field Interaction
    if (keys['Space']) {
        const tx = Math.round(tractor.mesh.position.x);
        const tz = Math.round(tractor.mesh.position.z);
        if (terrain[tx] && terrain[tx][tz] && terrain[tx][tz].type === 'dirt' && !terrain[tx][tz].tilled) {
            terrain[tx][tz].tilled = true;
            terrain[tx][tz].mesh.material.color.setHex(COLORS.TILLED);
            terrain[tx][tz].mesh.scale.y = 0.8;
            tilledCount++;
            updateStats();
        }
    }

    if (keys['Digit1']) camera.userData.mode = 'follow';
    if (keys['Digit2']) camera.userData.mode = 'top';
}

function updateStats() {
    document.getElementById('stats').innerText = `TILLED: ${tilledCount} | ANIMALS: ${animals.length}`;
    document.getElementById('status').innerText = tractor.vel > 0.1 ? "TRACTOR: DRIVING" : "TRACTOR: IDLE";
}

function onWindowResize() {
    camera.aspect = window.innerWidth / (window.innerHeight - 60);
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight - 60);
}

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    
    handleInput(delta);
    
    // Animal AI
    animals.forEach(a => {
        a.timer -= delta;
        if(a.timer <= 0) { a.dir = Math.random() * Math.PI * 2; a.timer = 2 + Math.random() * 4; }
        a.mesh.rotation.y = a.dir;
        a.mesh.translateZ(1.5 * delta);
        if(a.mesh.position.x < 0 || a.mesh.position.x > gridWidth) a.mesh.position.x = gridWidth/2;
        if(a.mesh.position.z < 0 || a.mesh.position.z > gridDepth) a.mesh.position.z = gridDepth/2;
    });

    // Camera follow
    const offset = new THREE.Vector3(0, 10, 15).applyQuaternion(tractor.mesh.quaternion);
    const targetPos = tractor.mesh.position.clone().add(offset);
    camera.position.lerp(targetPos, 0.1);
    camera.lookAt(tractor.mesh.position);

    renderer.render(scene, camera);
}
</script>
</body>
</html>
